<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Absence Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Sri Akilandeswari Women's College, Vandavasi</h1>
    <h3>Department of Computer Science</h3>
</header>

<div class="form-container">

    <h2>Student Absence Form</h2>

    <form id="absenceForm">

        <label>Student Name</label>
        <input type="text" id="name" required>

        <label>Department</label>
        <input type="text" id="department" value="Computer Science" readonly>

        <label>Year</label>
        <select id="year" required>
            <option value="">Select Year</option>
            <option value="I Year">I Year</option>
            <option value="II Year">II Year</option>
            <option value="III Year">III Year</option>
        </select>

        <label>Batch</label>
        <select id="batch" required>
            <option value="">Select Batch</option>
            <option value="Batch 1">Batch 1</option>
            <option value="Batch 2">Batch 2</option>
        </select>

        <label>Register Number</label>
        <input type="text" id="regNo" required>

        <label>Student Email</label>
        <input type="email" id="email" required>

        <label>Absent Date</label>
        <input type="date" id="absentDate" required>

        <label>Reason for Absence</label>
        <textarea id="reason" rows="4" required></textarea>

        <button type="submit" class="btn">
            Submit Request
        </button>

    </form>

</div>

<script src="script.js"></script>

</body>
</html>
